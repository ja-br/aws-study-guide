 bucket's KMS key policy must allow the target account to decrypt."},{domain:1,cat:"SDLC Automation",q:"What determines pass/fail in a CodeBuild phase?",a:"Process exit codes. Exit code 0 = success, any non-zero = failure (pipeline stops)."},{domain:1,cat:"SDLC Automation",q:"Secrets Manager vs. Parameter Store for credentials?",a:"Secrets Manager: built-in auto-rotation, costs per secret/API call. Parameter Store: simpler/cheaper (free standard tier), but rotation must be custom-built. Use Secrets Manager for DB credentials needing rotation."},{domain:1,cat:"SDLC Automation",q:"What is a Blue/Green deployment?",a:"Two identical environments run simultaneously. Traffic is switched from blue (old) to green (new). Enables fast rollback by switching traffic back."},{domain:1,cat:"SDLC Automation",q:"What is a Canary deployment?",a:"A small percentage of traffic goes to the new version first. After validation, all traffic shifts. Enables gradual, risk-averse validation."},{domain:1,cat:"SDLC Automation",q:"What is a Linear deployment?",a:"Traffic shifts in equal increments over time (e.g., 10% every 5 minutes). Provides more data points than canary for gradual rollback with control."},{domain:1,cat:"SDLC Automation",q:"What deployment types does CodeDeploy support for Lambda?",a:"Canary, Linear, and All-at-Once. It shifts alias traffic between function versions. Pre/PostTraffic hooks are Lambda functions for validation."},{domain:1,cat:"SDLC Automation",q:"What is the ECS blue/green deployment flow with CodeDeploy?",a:"New task set created → test traffic to test listener → pre-traffic hook validates → production traffic shifted → original task set terminated after bake time."},{domain:1,cat:"SDLC Automation",q:"What is AWS CodeArtifact?",a:"A managed package repository service supporting npm, Maven, PyPI, and NuGet. Domains group repos, and upstream connections proxy public registries."},{domain:1,cat:"SDLC Automation",q:"What is EC2 Image Builder?",a:"Automates creation of AMIs and container images via pipelines with build + test components. Produces golden images on a schedule or trigger."},{domain:1,cat:"SDLC Automation",q:"What are ECR lifecycle policies?",a:"Rules that automatically clean up old or untagged container images in ECR. Critical for cost management."},{domain:1,cat:"SDLC Automation",q:"What is CloudWatch Synthetics?",a:"Canary scripts that run on a schedule to monitor endpoints and APIs. Useful for post-deployment validation — detect issues before users do."},{domain:1,cat:"SDLC Automation",q:"What is an Immutable deployment?",a:"New instances launch in a new ASG. Once healthy, traffic swaps to the new ASG. Rollback = terminate the new ASG. Full fleet replacement."},{domain:1,cat:"SDLC Automation",q:"How do you build Docker images in CodeBuild?",a:"Enable privileged mode in the build environment. Use the aws/codebuild/standard image with Docker runtime. Authenticate to ECR with `aws ecr get-login-password` in pre_build phase."},{domain:1,cat:"SDLC Automation",q:"What caching options does CodeBuild support?",a:"S3 caching (persists across builds, slower) and local caching (faster, per-build host — source, Docker layer, or custom cache). Use caching to speed up dependency installation and Docker layer reuse."},{domain:1,cat:"SDLC Automation",q:"How does CodeBuild access resources in a VPC?",a:"Configure VPC settings (VPC ID, subnets, security groups) in the build project. CodeBuild creates ENIs in your subnets. Required for accessing private resources like RDS, ElastiCache, or internal APIs during builds."},{domain:1,cat:"SDLC Automation",q:"What are CodePipeline manual approval actions?",a:"A pipeline stage action that pauses execution and sends an SNS notification. A designated IAM user must approve or reject before the pipeline continues. Used for production gate reviews."},{domain:1,cat:"SDLC Automation",q:"How do CodePipeline cross-region actions work?",a:"Pipeline creates an artifact bucket in each target region. Actions like CloudFormation deploy or CodeDeploy can target resources in different regions. The pipeline replicates artifacts automatically."},{domain:1,cat:"SDLC Automation",q:"What are CodePipeline execution modes?",a:"SUPERSEDED (default): newer execution replaces in-progress one. QUEUED: executions wait in order. PARALLEL: multiple executions run simultaneously. Choose based on deployment strategy needs."},{domain:1,cat:"SDLC Automation",q:"What is an AppSpec file in CodeDeploy?",a:"YAML/JSON file defining deployment instructions. For EC2: specifies file mappings (source to destination) and lifecycle hook scripts. For Lambda/ECS: specifies task definition, traffic shifting, and validation hooks."},{domain:1,cat:"SDLC Automation",q:"What is the EC2 CodeDeploy lifecycle hook order?",a:"ApplicationStop → DownloadBundle → BeforeInstall → Install → AfterInstall → ApplicationStart → ValidateService. BeforeBlockTraffic and AfterBlockTraffic wrap deregistration from the load balancer."},{domain:1,cat:"SDLC Automation",q:"How do CodeDeploy rollbacks work?",a:"Automatic rollback triggers on deployment failure or CloudWatch alarm threshold breach. Rollback deploys the last known good revision as a NEW deployment — it does not restore old files in place."},{domain:2,cat:"Config & IaC",q:"What are CloudFormation StackSets?",a:"Deploy CloudFormation stacks across multiple accounts and regions simultaneously. Service-managed permissions (via Organizations) is recommended."},{domain:2,cat:"Config & IaC",q:"What are CloudFormation Change Sets?",a:"Preview changes before executing a stack update. Shows which resources will be added, modified, or replaced — no surprises."},{domain:2,cat:"Config & IaC",q:"What is CloudFormation Drift Detection?",a:"Identifies when actual resource configuration differs from the template definition. Detects manual changes made outside of CloudFormation."},{domain:2,cat:"Config & IaC",q:"What is a CloudFormation DeletionPolicy?",a:"Controls what happens to resources when a stack is deleted. Options: Retain (keep it), Snapshot (take a snapshot first), or Delete (remove it)."},{domain:2,cat:"Config & IaC",q:"What are cfn-init and cfn-signal?",a:"Helper scripts for EC2 configuration. cfn-signal with CreationPolicy/WaitCondition ensures instances are fully configured before being marked CREATE_COMPLETE."},{domain:2,cat:"Config & IaC",q:"What is AWS CDK?",a:"Cloud Development Kit — write IaC in programming languages (TypeScript, Python, Java, C#). Synthesizes to CloudFormation templates. CDK Pipelines provide self-mutating CI/CD."},{domain:2,cat:"Config & IaC",q:"What is AWS SAM?",a:"Serverless Application Model — a CloudFormation extension for serverless with simplified syntax for Lambda, API Gateway, DynamoDB, and Step Functions."},{domain:2,cat:"Config & IaC",q:"What are Service Control Policies (SCPs)?",a:"JSON policies that set maximum permissions for accounts in an OU. They don't grant permissions — they restrict what IAM policies can allow. Explicit deny overrides any allow."},{domain:2,cat:"Config & IaC",q:"Do SCPs affect service-linked roles?",a:"No. SCPs affect all users and roles (including root) EXCEPT service-linked roles."},{domain:2,cat:"Config & IaC",q:"What is AWS Control Tower?",a:"Automates multi-account setup with best practices: Landing Zone, Guardrails (Preventive/Detective/Proactive), and Account Factory for provisioning new accounts."},{domain:2,cat:"Config & IaC",q:"What is SSM Run Command?",a:"Execute commands remotely on managed instances without SSH. Requires SSM Agent and IAM instance profile with AmazonSSMManagedInstanceCore."},{domain:2,cat:"Config & IaC",q:"What is SSM State Manager?",a:"Defines and enforces desired state configurations on managed instances on a recurring schedule."},{domain:2,cat:"Config & IaC",q:"What is SSM AppConfig?",a:"Deploy application configuration with validation and rollback. Supports feature flags and gradual config deployments."},{domain:2,cat:"Config & IaC",q:"What are AWS Config Rules?",a:"Managed or custom (Lambda-backed) rules that evaluate resource compliance continuously. Auto-remediation triggers SSM Automation documents to fix non-compliant resources."},{domain:2,cat:"Config & IaC",q:"What is an AWS Config Aggregator?",a:"Collects Config data across multiple accounts and regions into a single view for centralized compliance monitoring."},{domain:2,cat:"Config & IaC",q:"What are CloudFormation custom resources?",a:"Lambda-backed resources for logic CloudFormation doesn't natively support (e.g., empty S3 buckets on delete, look up AMI IDs). Triggered via SNS or Lambda. Must send SUCCESS/FAILED response to the pre-signed URL."},{domain:2,cat:"Config & IaC",q:"What are CloudFormation stack policies?",a:"JSON policies that protect stack resources from unintended updates. By default, all resources can be updated. A stack policy can deny updates to specific resource types or logical IDs. Must be explicitly overridden during updates."},{domain:2,cat:"Config & IaC",q:"When to use nested stacks vs. StackSets?",a:"Nested stacks: decompose a complex single-account deployment into reusable templates (parent-child). StackSets: deploy the same template across multiple accounts and regions. Different problems — composition vs. distribution."},{domain:2,cat:"Config & IaC",q:"How does CloudFormation handle Auto Scaling group updates?",a:"UpdatePolicy attribute controls rolling updates: MinInstancesInService, MaxBatchSize, PauseTime, WaitOnResourceSignals. Ensures capacity during updates. Without it, all instances replace at once."},{domain:2,cat:"Config & IaC",q:"What is CloudFormation resource import?",a:"Bring existing resources under CloudFormation management without recreating them. Add resource to template with DeletionPolicy: Retain, then import using the resource identifier. No disruption to running resources."},{domain:2,cat:"Config & IaC",q:"What is SSM Patch Manager?",a:"Automates OS and application patching on managed instances. Uses patch baselines (rules for auto-approval), patch groups (instance targeting), and maintenance windows for scheduling."},{domain:2,cat:"Config & IaC",q:"What is SSM Session Manager?",a:"Browser-based or CLI interactive shell access to instances without opening SSH ports or managing keys. All sessions are logged to S3/CloudWatch. Requires SSM Agent and IAM permissions."},{domain:2,cat:"Config & IaC",q:"What are SSM Automation runbooks?",a:"Predefined or custom workflows that automate operational tasks (e.g., restart instance, create AMI, remediate Config findings). Can be triggered by Config rules, EventBridge, or manually. Support approval steps."},{domain:2,cat:"Config & IaC",q:"How does SCP inheritance work in Organizations?",a:"SCPs are inherited down the OU hierarchy. Effective permissions = intersection of all SCPs from root to account. An allow at a child OU cannot override a deny at the parent. The management account is unaffected by SCPs."},{domain:2,cat:"Config & IaC",q:"What is a delegated administrator in Organizations?",a:"A member account granted permissions to manage an AWS service (e.g., GuardDuty, Security Hub, Config) on behalf of the organization. Reduces the need to use the management account for day-to-day operations."},{domain:2,cat:"Config & IaC",q:"What are the three types of Control Tower guardrails?",a:"Preventive: SCPs that block disallowed actions (e.g., deny region changes). Detective: AWS Config rules that monitor compliance. Proactive: CloudFormation hooks that check resources before provisioning."},{domain:2,cat:"Config & IaC",q:"What are AWS Config conformance packs?",a:"Collections of Config rules and remediation actions packaged as a single entity. Deploy across accounts via Organizations. Use sample templates (e.g., S3 Operational Best Practices) or create custom packs."},{domain:3,cat:"Resilience",q:"What is RDS Multi-AZ?",a:"Synchronous standby replica in another AZ with automatic failover (60–90 sec). For HA only — NOT for read scaling. Use Read Replicas for reads."},{domain:3,cat:"Resilience",q:"What is Aurora Global Database?",a:"Cross-region replication with typically <1 second lag. Up to 5 secondary regions. Enables low-latency global reads and disaster recovery."},{domain:3,cat:"Resilience",q:"What are DynamoDB Global Tables?",a:"Multi-region, multi-active replication. Write to any region, <1 second replication. No application changes needed for multi-region writes."},{domain:3,cat:"Resilience",q:"What does S3 Cross-Region Replication require?",a:"Versioning must be enabled on BOTH source and destination buckets. Replication is automatic and asynchronous."},{domain:3,cat:"Resilience",q:"What is Target Tracking Auto Scaling?",a:"Maintains a metric at a target value (e.g., 'keep CPU at 50%'). Automatically adjusts capacity up and down. Simplest and most common scaling policy."},{domain:3,cat:"Resilience",q:"What is Predictive Scaling?",a:"ML-based forecasting that proactively provisions capacity based on recurring traffic patterns. Best for workloads with predictable cycles."},{domain:3,cat:"Resilience",q:"What are Auto Scaling Warm Pools?",a:"Pre-initialized instances in a stopped (or hibernated) state for faster scale-out. Reduces launch time vs. starting from scratch."},{domain:3,cat:"Resilience",q:"What is ECS Capacity Providers?",a:"Managed scaling of underlying EC2 instances or Fargate. Automatically provisions compute to match task demand."},{domain:3,cat:"Resilience",q:"What is Karpenter (EKS)?",a:"A flexible node provisioner for Kubernetes that selects the right instance type and size based on pod resource requirements. More flexible than Cluster Autoscaler."},{domain:3,cat:"Resilience",q:"Backup & Restore DR strategy?",a:"Lowest cost, highest RTO/RPO (hours). Back up data, restore when needed. Acceptable when long recovery times are tolerable."},{domain:3,cat:"Resilience",q:"Pilot Light DR strategy?",a:"Low cost, RTO in tens of minutes. Core services always running (e.g., DB replica). Scale up other components during disaster."},{domain:3,cat:"Resilience",q:"Warm Standby DR strategy?",a:"Medium cost, RTO in minutes. A scaled-down but fully functional copy runs in the DR region. Scale up to full capacity during disaster."},{domain:3,cat:"Resilience",q:"Multi-Site Active/Active DR strategy?",a:"Highest cost, near-zero RTO/RPO. Full production runs in multiple regions. Route 53 distributes traffic. Instant failover."},{domain:3,cat:"Resilience",q:"What is AWS Elastic Disaster Recovery (DRS)?",a:"Block-level replication of on-premises or cloud servers to AWS. Continuous replication with sub-second RPO."},{domain:3,cat:"Resilience",q:"What is Lambda Provisioned Concurrency?",a:"Pre-warms execution environments to eliminate cold starts. You pay for the provisioned capacity whether used or not."},{domain:3,cat:"Resilience",q:"What is Lambda reserved concurrency?",a:"Guarantees a set number of concurrent executions for a function and caps it at that limit. Unlike provisioned concurrency, it doesn't pre-warm — cold starts still occur. Free to configure. Prevents one function from consuming all account concurrency."},{domain:3,cat:"Resilience",q:"What are Lambda layers?",a:"ZIP archives containing libraries, runtimes, or other dependencies shared across functions. Up to 5 layers per function. Reduces deployment package size and promotes code reuse across teams."},{domain:3,cat:"Resilience",q:"How does Lambda behave in a VPC?",a:"Lambda creates Hyperplane ENIs in your VPC subnets to access private resources. Requires subnets in multiple AZs for HA. Uses a NAT gateway for internet access (no public IP). IAM role needs ec2:CreateNetworkInterface permissions."},{domain:3,cat:"Resilience",q:"Lambda@Edge vs. CloudFront Functions?",a:"CloudFront Functions: lightweight (viewer request/response only), sub-millisecond, JavaScript only, 10KB max. Lambda@Edge: full Lambda (all 4 trigger points), up to 30s timeout, any runtime, 50MB max. Use CloudFront Functions for simple header/URL manipulations."},{domain:3,cat:"Resilience",q:"What is the difference between API Gateway REST API and HTTP API?",a:"HTTP API: lower cost (~70% cheaper), lower latency, simpler, supports OIDC/OAuth2 natively. REST API: more features — usage plans, API keys, request validation, WAF integration, caching, resource policies, private APIs. Use HTTP API unless you need REST-specific features."},{domain:3,cat:"Resilience",q:"How does API Gateway caching work?",a:"REST API only. Caches endpoint responses for a specified TTL (default 300s, max 3600s). Per-stage configuration. Cache sizes from 0.5GB to 237GB. Reduces backend calls and improves latency. Invalidate with Cache-Control: max-age=0 header."},{domain:3,cat:"Resilience",q:"How does API Gateway throttling work?",a:"Default: 10,000 requests/second account-wide, 5,000 burst. Per-stage and per-method throttling via usage plans. Returns 429 Too Many Requests when exceeded. Protects backends from traffic spikes."},{domain:3,cat:"Resilience",q:"What is the difference between Kinesis Data Streams and Data Firehose?",a:"Data Streams: real-time (<200ms), custom consumers, manual scaling (shards), 1–365 day retention. Firehose: near-real-time (60s buffer), fully managed delivery to S3/Redshift/OpenSearch/Splunk, auto-scaling, built-in transformation. Use Streams for real-time processing, Firehose for delivery."},{domain:4,cat:"Monitoring",q:"What EC2 metrics require the CloudWatch Agent?",a:"Memory utilization and disk space usage. Default EC2 metrics only cover CPU, Network, Disk I/O, and Status Checks."},{domain:4,cat:"Monitoring",q:"What are CloudWatch Metric Filters?",a:"Extract metric values from log events using filter patterns. Create custom metrics and alarms from log data."},{domain:4,cat:"Monitoring",q:"What are CloudWatch Composite Alarms?",a:"Combine multiple alarms with AND/OR logic to reduce alarm noise. Trigger only when multiple conditions are met simultaneously."},{domain:4,cat:"Monitoring",q:"What is CloudWatch Anomaly Detection?",a:"ML-based bands that automatically detect metric anomalies without needing static thresholds. Adapts to normal patterns."},{domain:4,cat:"Monitoring",q:"What are CloudWatch Subscription Filters?",a:"Real-time streaming of log data to Lambda, Kinesis Data Streams, Kinesis Data Firehose, or OpenSearch."},{domain:4,cat:"Monitoring",q:"What is AWS X-Ray?",a:"Distributed tracing service. Traces end-to-end requests across services. Service maps show architecture and latency. Uses sampling rules to control volume."},{domain:4,cat:"Monitoring",q:"What is CloudTrail?",a:"Records ALL API calls (console, CLI, SDK) across your AWS account. Management events logged by default. Data events must be explicitly enabled."},{domain:4,cat:"Monitoring",q:"What is the CloudTrail delivery delay?",a:"~15 minutes to S3. For real-time processing, send events to CloudWatch Logs or EventBridge."},{domain:4,cat:"Monitoring",q:"What is Amazon EventBridge?",a:"Serverless event bus for event-driven architecture. Pattern-based filtering, rule routing to targets (Lambda, SQS, SNS, Step Functions), cron/rate scheduling."},{domain:4,cat:"Monitoring",q:"What is CloudWatch Logs Insights?",a:"A SQL-like query language purpose-built for analyzing CloudWatch log data interactively."},{domain:4,cat:"Monitoring",q:"What is CloudWatch RUM?",a:"Real User Monitoring for web applications. Captures client-side performance data from actual users."},{domain:4,cat:"Monitoring",q:"What are CloudWatch Metric Streams?",a:"Near-real-time streaming of CloudWatch metrics to S3 or third-party tools via Kinesis Data Firehose."},{domain:4,cat:"Monitoring",q:"What is a Kinesis shard and how does it scale?",a:"Each shard provides 1 MB/s input, 2 MB/s output, 1,000 records/s write. Scale by splitting (increase) or merging (decrease) shards. On-demand mode auto-scales. Partition key determines shard routing — hot keys cause hot shards."},{domain:4,cat:"Monitoring",q:"What is Kinesis enhanced fan-out?",a:"Dedicated 2 MB/s throughput per consumer per shard (vs. shared 2 MB/s across all consumers). Uses SubscribeToShard (push, HTTP/2). Use when you have multiple consumers or need sub-200ms latency."},{domain:4,cat:"Monitoring",q:"What types of EventBridge event buses exist?",a:"Default bus: receives events from AWS services automatically. Custom bus: receives events from your applications via PutEvents. Partner bus: receives events from SaaS partners (Datadog, Zendesk, etc.). Rules route events from buses to targets."},{domain:4,cat:"Monitoring",q:"What is the EventBridge Schema Registry?",a:"Automatically discovers and stores event schemas from your event bus. Generates code bindings (Java, Python, TypeScript) for strongly-typed event handling. Supports OpenAPI 3 and JSONSchema Draft4 formats."},{domain:5,cat:"Incident Response",q:"What is the SNS fan-out pattern?",a:"SNS topic → multiple SQS queues or Lambda functions. Each subscriber gets a copy of every message. Enables parallel, independent processing."},{domain:5,cat:"Incident Response",q:"What is a Dead-Letter Queue (DLQ)?",a:"Captures messages that fail processing after a specified number of attempts (maxReceiveCount). Used on SQS queues and Lambda event source mappings for failure analysis."},{domain:5,cat:"Incident Response",q:"How does automated GuardDuty remediation work?",a:"GuardDuty finding → EventBridge rule (matches finding type) → Lambda function remediates (e.g., isolate instance) → SNS notifies the team."},{domain:5,cat:"Incident Response",q:"What is AWS Config Auto-Remediation?",a:"Config rule detects non-compliance → triggers an SSM Automation document to automatically fix the resource. Example: auto-enable S3 encryption."},{domain:5,cat:"Incident Response",q:"What is EC2 Auto Recovery?",a:"A CloudWatch alarm triggers EC2 recovery on system status check failure. Preserves instance ID, private IP, Elastic IP, and EBS volumes."},{domain:5,cat:"Incident Response",q:"What is AWS Step Functions?",a:"Serverless orchestration for complex workflows with branching, retries, error handling, and parallel execution. Supports many task types beyond Lambda."},{domain:5,cat:"Incident Response",q:"Where are CodeDeploy logs on EC2?",a:"/var/log/aws/codedeploy-agent/ — check here for deployment lifecycle hook failures."},{domain:5,cat:"Incident Response",q:"What is AWS Fault Injection Simulator (FIS)?",a:"Chaos engineering service for running controlled fault injection experiments on AWS resources to test resilience."},{domain:5,cat:"Incident Response",q:"What are common ECS task failure causes?",a:"OOM kills, Docker image pull failures, port conflicts, task role permission issues. Check stopped task reasons in ECS console."},{domain:5,cat:"Incident Response",q:"What is DynamoDB Streams?",a:"Captures item-level changes in a DynamoDB table. Can trigger Lambda functions for event-driven processing (CQRS/Event Sourcing pattern)."},{domain:5,cat:"Incident Response",q:"What is EventBridge archive and replay?",a:"Archive stores events indefinitely or for a retention period. Replay re-sends archived events to an event bus for reprocessing. Useful for debugging, testing, or recovering from downstream failures."},{domain:5,cat:"Incident Response",q:"What are Lambda destinations for async invocations?",a:"Route successful or failed async invocation results to SQS, SNS, Lambda, or EventBridge without custom code. More flexible than DLQ — captures both success and failure with full invocation context."},{domain:5,cat:"Incident Response",q:"What is Kinesis Client Library (KCL) checkpointing?",a:"KCL tracks processing progress per shard using a DynamoDB checkpoint table. If a consumer fails, another picks up from the last checkpoint. Prevents duplicate processing and ensures at-least-once delivery with proper checkpoint management."},{domain:6,cat:"Security",q:"What is the IAM policy evaluation order?",a:"1) Explicit Deny always wins. 2) Explicit Allow. 3) Implicit Deny (default). SCPs, permission boundaries, and session policies further restrict effective permissions."},{domain:6,cat:"Security",q:"What are IAM Permission Boundaries?",a:"Set the maximum permissions an IAM entity can have. Even if an identity policy grants broader access, the boundary caps it. Used for safe delegation."},{domain:6,cat:"Security",q:"What is IAM Identity Center (SSO)?",a:"Central identity management for all AWS accounts. Integrates with AD, SAML 2.0, built-in store. Permission sets define access. Recommended for human access."},{domain:6,cat:"Security",q:"OIDC Identity Providers vs. SAML in IAM?",a:"OIDC: for machine identity (GitHub Actions, Kubernetes) — short-lived tokens, no stored credentials. SAML: legacy approach for human federation."},{domain:6,cat:"Security",q:"How does KMS key policy work?",a:"The PRIMARY access control for KMS keys. Even if IAM grants access, the key policy must also allow it. For cross-account use, the key policy must explicitly allow the external account."},{domain:6,cat:"Security",q:"Security Groups vs. NACLs?",a:"SGs: instance-level, stateful, allow only, all rules evaluated. NACLs: subnet-level, stateless, allow + deny, rules evaluated in numbered order (first match)."},{domain:6,cat:"Security",q:"What is AWS WAF?",a:"Web Application Firewall protecting ALB, CloudFront, API Gateway, AppSync. Managed rules, rate limiting, IP sets. Layer 7 (application layer) protection."},{domain:6,cat:"Security",q:"What is AWS GuardDuty?",a:"Intelligent threat detection using ML on CloudTrail, VPC Flow Logs, and DNS logs. Integrates with EventBridge, Security Hub, and Detective."},{domain:6,cat:"Security",q:"What is Amazon Inspector?",a:"Automated vulnerability scanning for EC2 instances, Lambda functions, and ECR container images. Scan-on-push for ECR. Integrates with Security Hub."},{domain:6,cat:"Security",q:"What is AWS Security Hub?",a:"Centralized security findings from GuardDuty, Inspector, Macie, IAM Access Analyzer, Config. Runs compliance checks (CIS, PCI DSS, AWS Best Practices)."},{domain:6,cat:"Security",q:"What is Amazon Macie?",a:"ML-based service to discover and classify sensitive data (PII, financial data) in S3 buckets."},{domain:6,cat:"Security",q:"What is AWS CloudHSM?",a:"Dedicated hardware security modules. Use when FIPS 140-2 Level 3 compliance or full key control is required."},{domain:6,cat:"Security",q:"What is IAM Access Analyzer?",a:"Identifies resources shared externally (e.g., S3 buckets, IAM roles with cross-account trust). Also validates IAM policies for errors."},{domain:6,cat:"Security",q:"Lambda execution role vs. resource policy?",a:"Execution role = what Lambda CAN DO (permissions to other services). Resource policy = WHO CAN INVOKE Lambda (e.g., allow API Gateway or another account)."},{domain:6,cat:"Security",q:"Parameter Store: Standard vs. Advanced?",a:"Standard: free, 10,000 params, 4KB max. Advanced: paid, 100,000 params, 8KB max, parameter policies for expiration/notification."},{domain:6,cat:"Security",q:"What is IAM Roles Anywhere?",a:"Allows on-premises workloads to obtain temporary AWS credentials using X.509 certificates from a trusted Certificate Authority (CA). Eliminates long-term access keys for hybrid environments. Uses trust anchors and profiles."},{domain:6,cat:"Security",q:"How does cross-account IAM role assumption work?",a:"Account A creates a role with a trust policy allowing Account B. Account B's user/role calls sts:AssumeRole. Returns temporary credentials scoped to the role's permissions. Always use external ID condition for third-party access to prevent confused deputy attacks."},{domain:6,cat:"Security",q:"What is KMS envelope encryption?",a:"KMS generates a data key. Encrypt data locally with the plaintext data key, store the encrypted data key alongside the ciphertext, then discard the plaintext key. Decrypt by calling KMS to decrypt the data key first. Avoids sending large payloads to KMS."},{domain:6,cat:"Security",q:"How does KMS automatic key rotation work?",a:"Symmetric KMS keys only. Rotates key material annually (configurable 90–2560 days). The key ID and ARN stay the same — old key material is retained for decryption. Asymmetric and imported keys must be rotated manually via alias swapping."},{domain:6,cat:"Security",q:"What are KMS multi-Region keys?",a:"Primary key replicated to other regions as replica keys. Same key ID and material in all regions — ciphertext encrypted in one region can be decrypted in another. Useful for cross-region disaster recovery and global applications."},{domain:6,cat:"Security",q:"How does Secrets Manager automatic rotation work?",a:"Rotation Lambda function creates new credentials on a schedule (e.g., every 30 days). Four steps: createSecret, setSecret, testSecret, finishSecret. Native integration for RDS, Redshift, DocumentDB. Custom Lambda for other secret types."},{domain:6,cat:"Security",q:"What are Secrets Manager multi-Region secrets?",a:"Replicate a secret to multiple AWS regions. One primary and multiple replica secrets kept in sync. Replica can be promoted to standalone if needed. Enables cross-region disaster recovery for applications that need secrets."},{domain:6,cat:"Security",q:"What data sources does GuardDuty analyze?",a:"CloudTrail management and data events, VPC Flow Logs, DNS logs, S3 data events, EKS audit logs, RDS login events, Lambda network activity, and EBS volume data (malware scanning). All analyzed without enabling these services separately."},{domain:6,cat:"Security",q:"What are GuardDuty finding types and suppression rules?",a:"Findings categorized by resource: EC2 (crypto mining, C2), S3 (public access, policy changes), IAM (credential compromise). Severity: Low/Medium/High. Suppression rules auto-archive expected findings (e.g., known pentest IPs) to reduce noise."},{domain:6,cat:"Security",q:"What are API Gateway authorizer types?",a:"IAM authorizer: SigV4 signed requests, best for AWS service-to-service. Cognito authorizer: validates JWT tokens from Cognito User Pools. Lambda authorizer: custom auth logic (token-based or request-based), returns IAM policy. REST API also supports resource policies."}],df={1:{bg:"#0F4C75",accent:"#3282B8",light:"#BBE1FA"},2:{bg:"#1A535C",accent:"#4ECDC4",light:"#C7F9EE"},3:{bg:"#6B2D5B",accent:"#D64292",light:"#F8D5E8"},4:{bg:"#3D405B",accent:"#81B29A",light:"#D5EDE1"},5:{bg:"#9B2226",accent:"#E76F51",light:"#FDDEC0"},6:{bg:"#2B2D42",accent:"#EF233C",light:"#FFD6DA"}},ih={1:"SDLC Automation",2:"Config & IaC",3:"Resilience",4:"Monitoring",5:"Incident Response",6:"Security"};function Dd(D){const F=[...D];for(let Y=F.length-1;Y>0;Y--){const h=Math.floor(Math.random()*(Y+1));[F[Y],F[h]]=[F[h],F[Y]]}return F}function ch(){const[D,F]=rl.useState("menu"),[Y,h]=rl.useState(new Set([1,2,3,4,5,6])),[B,$]=rl.useState([]),[ct,Ot]=rl.useState(0),[R,E]=rl.useState(!1),[W,x]=rl.useState([]),[I,Nt]=rl.useState([]),[Ht,zt]=rl.useState(null),[tl,Qt]=rl.useState(!1),zl=rl.useCallback(()=>{const X=Gu.filter(et=>Y.has(et.domain));X.length!==0&&($(Dd(X)),Ot(0),E(!1),x([]),Nt([]),zt(null),F("play"))},[Y]),Rt=X=>{h(et=>{const nt=new Set(et);return nt.has(X)?nt.delete(X):nt.add(X),nt})},qt=rl.useCallback(X=>{if(tl)return;Qt(!0);const et=B[ct];zt(X==="know"?"right":"left"),setTimeout(()=>{X==="know"?x(nt=>[...nt,et]):Nt(nt=>[...nt,et]),ct+1<B.length?(Ot(nt=>nt+1),E(!1)):F("results"),zt(null),Qt(!1)},350)},[B,ct,tl]),dl=()=>{I.length!==0&&($(Dd(I)),Ot(0),E(!1),x([]),Nt([]),zt(null),F("play"))};rl.useEffect(()=>{const X=et=>{D==="play"&&((et.key===" "||et.key==="Enter")&&(et.preventDefault(),E(nt=>!nt)),et.key==="ArrowRight"&&R&&qt("know"),et.key==="ArrowLeft"&&R&&qt("learn"))};return window.addEventListener("keydown",X),()=>window.removeEventListener("keydown",X)},[D,R,qt]);const pt=B[ct],N=pt?df[pt.domain]:df[1],Xt=B.length>0?(ct+1)/B.length*100:0;if(D==="menu")return z.jsxs("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg, #0a
