<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOP-C02 Knowledge Check</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273448;
    --border: #334155;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --radius: 12px;
    --accent: #3b82f6;
    --accent-bg: rgba(59,130,246,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  #app { width: 100%; max-width: 760px; }

  /* -- Utility -- */
  .hidden { display: none !important; }
  .mono { font-family: 'Space Mono', monospace; }

  /* -- Header -- */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
  .header p  { color: var(--text-muted); margin-top: 0.4rem; font-size: 0.95rem; }

  /* -- Menu -- */
  .menu-grid {
    display: grid;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .domain-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .domain-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    background: var(--surface);
  }
  .domain-header:hover { background: var(--surface2); }

  .domain-checkbox {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .domain-header.checked .domain-checkbox {
    background: var(--domain-color);
    border-color: var(--domain-color);
  }
  .domain-checkbox svg { display: none; }
  .domain-header.checked .domain-checkbox svg { display: block; }

  .domain-name {
    flex: 1;
    font-weight: 600;
    font-size: 0.95rem;
  }
  .domain-num {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .domain-count {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
  }
  .domain-expand {
    color: var(--text-muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .domain-expand.open { transform: rotate(180deg); }

  .domain-services {
    display: none;
    padding: 0.25rem 0.5rem 0.5rem;
    background: var(--bg);
  }
  .domain-services.open { display: block; }

  .service-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.85rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
    margin-top: 0.4rem;
  }
  .service-row:hover { border-color: #475569; background: var(--surface2); }
  .service-row.checked { border-color: var(--domain-color); }

  .service-checkbox {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .service-row.checked .service-checkbox {
    background: var(--domain-color);
    border-color: var(--domain-color);
  }
  .service-checkbox svg { display: none; }
  .service-row.checked .service-checkbox svg { display: block; }

  .service-badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
    flex: 1;
  }

  .service-count { color: var(--text-muted); font-size: 0.8rem; font-family: 'Space Mono', monospace; }

  .menu-actions {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.55rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-ghost:hover { border-color: #475569; color: var(--text); }

  .btn-primary {
    margin-left: auto;
    background: #3b82f6;
    color: #fff;
    border: none;
    padding: 0.65rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-primary:hover:not(:disabled) { background: #2563eb; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* -- Quiz -- */
  .quiz-header { margin-bottom: 1.5rem; }
  .quiz-domain-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }
  .progress-label { font-size: 0.85rem; color: var(--text-muted); font-family: 'Space Mono', monospace; white-space: nowrap; }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
    transition: width 0.3s ease, background 0.3s ease;
  }

  .q-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.25rem 0.65rem;
    border-radius: 6px;
    margin-bottom: 1rem;
  }

  .q-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }

  .options-grid {
    display: grid;
    gap: 0.65rem;
    margin-bottom: 1.25rem;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    line-height: 1.45;
    transition: border-color 0.15s, background 0.15s;
  }
  .option-btn:hover:not(:disabled) { border-color: #475569; background: var(--surface2); }
  .option-btn:disabled { cursor: default; }

  .option-letter {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 5px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: background 0.15s, color 0.15s;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .option-btn.correct .option-letter {
    background: var(--green);
    color: #fff;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: var(--red-dim);
  }
  .option-btn.wrong .option-letter {
    background: var(--red);
    color: #fff;
  }

  .quiz-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 1rem;
    min-height: 44px;
  }
  .feedback-text {
    font-size: 0.9rem;
    font-weight: 600;
  }
  .feedback-text.correct { color: var(--green); }
  .feedback-text.wrong   { color: var(--red); }

  .btn-next {
    background: #3b82f6;
    color: #fff;
    border: none;
    padding: 0.65rem 1.25rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    transition: background 0.15s;
  }
  .btn-next:hover { background: #2563eb; }

  /* -- Results -- */
  .results-score {
    text-align: center;
    margin-bottom: 2rem;
  }
  .results-score .big { font-size: 3rem; font-weight: 700; font-family: 'Space Mono', monospace; }
  .results-score .pct { font-size: 1.1rem; color: var(--text-muted); margin-top: 0.25rem; }

  .breakdown-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    font-weight: 600;
  }

  .breakdown-grid {
    display: grid;
    gap: 0.5rem;
    margin-bottom: 1.75rem;
  }

  .domain-breakdown-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 0.5rem;
  }
  .domain-breakdown-header:first-child { margin-top: 0; }
  .domain-breakdown-name {
    flex: 1;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem 1rem 0.5rem 1.5rem;
  }

  .breakdown-score {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .breakdown-score.perfect { color: var(--green); }
  .breakdown-score.partial { color: #f59e0b; }
  .breakdown-score.zero    { color: var(--red); }

  .breakdown-bar-wrap {
    width: 80px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .breakdown-bar {
    height: 100%;
    border-radius: 99px;
    background: #3b82f6;
  }

  .results-actions {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  /* -- Explanation -- */
  .explanation-box {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 0.85rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    line-height: 1.55;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .explanation-box.visible { opacity: 1; }
  .explanation-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
  }

  /* -- Keyboard hint -- */
  .kbd-hint {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.75rem;
    margin-top: 1rem;
  }
  .kbd { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: 'Space Mono', monospace; font-size: 0.7rem; }

  .option-btn:focus-visible,
  .btn-primary:focus-visible,
  .btn-next:focus-visible,
  .btn-ghost:focus-visible,
  .service-row:focus-visible,
  .domain-header:focus-visible {
    outline: 2px solid #3b82f6;
    outline-offset: 2px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- MENU -->
  <div id="screen-menu">
    <div class="header">
      <h1>DOP-C02 Quiz</h1>
      <p>Select domains and services to study</p>
    </div>
    <div class="menu-grid" id="domain-list"></div>
    <div class="menu-actions">
      <button class="btn-ghost" id="btn-toggle-all">Deselect All</button>
      <button class="btn-primary" id="btn-start" disabled>Start Quiz</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-header">
      <div class="quiz-domain-label" id="quiz-domain-label"></div>
      <div class="progress-row">
        <span class="progress-label" id="progress-label">1 / 10</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <span class="q-badge" id="q-badge">CodeCommit</span>
      <div class="q-text" id="q-text" role="heading" aria-level="2"></div>
    </div>
    <div class="options-grid" id="options-grid"></div>
    <div class="explanation-box" id="explanation-box">
      <div class="explanation-label"></div>
      <div class="explanation-body" aria-live="polite"></div>
    </div>
    <div class="quiz-footer">
      <span class="feedback-text" id="feedback-text" aria-live="polite"></span>
      <button class="btn-next hidden" id="btn-next">Next &rarr;</button>
    </div>
    <div class="kbd-hint">
      <kbd class="kbd">1</kbd><kbd class="kbd">2</kbd><kbd class="kbd">3</kbd><kbd class="kbd">4</kbd> to select &nbsp;&middot;&nbsp;
      <kbd class="kbd">Enter</kbd> / <kbd class="kbd">Space</kbd> to advance
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="hidden">
    <div class="header"><h1>Quiz Complete</h1></div>
    <div class="results-score">
      <div class="big" id="score-big"></div>
      <div class="pct" id="score-pct"></div>
    </div>
    <div class="breakdown-title">Per-Domain Breakdown</div>
    <div class="breakdown-grid" id="breakdown-grid"></div>
    <div class="results-actions">
      <button class="btn-ghost" id="btn-requiz-missed">Re-quiz Missed Questions</button>
      <button class="btn-primary" id="btn-restart">&larr; Back to Menu</button>
    </div>
  </div>

</div>

<!-- ============ DATA ============ -->
<script id="quiz-data">
const DOMAINS = {
  1: { name: "SDLC Automation",    color: "#3282B8", bg: "rgba(50,130,184,0.15)" },
  2: { name: "Config & IaC",       color: "#4ECDC4", bg: "rgba(78,205,196,0.15)" },
  3: { name: "Resilience",         color: "#D64292", bg: "rgba(214,66,146,0.15)" },
  4: { name: "Monitoring",         color: "#81B29A", bg: "rgba(129,178,154,0.15)" },
  5: { name: "Incident Response",  color: "#E76F51", bg: "rgba(231,111,81,0.15)" },
  6: { name: "Security",           color: "#EF233C", bg: "rgba(239,35,60,0.15)" },
};

const SERVICES = [
  { id: "CodeCommit",                     domain: 1 },
  { id: "CodePipeline",                   domain: 1 },
  { id: "CodeBuild",                      domain: 1 },
  { id: "CodeDeploy",                     domain: 1 },
  { id: "CodeArtifact",                   domain: 1 },
  { id: "SAM & CDK Pipelines",            domain: 1 },
  { id: "Cross-Account & Multi-Region",   domain: 1 },
  { id: "CodeGuru",                        domain: 1 },
  { id: "EC2 Image Builder",              domain: 1 },
  { id: "AWS Amplify",                     domain: 1 },
  { id: "CloudFormation",                  domain: 2 },
];

const QUESTIONS = [
  /* -- CodeCommit (7) -- */
  {
    domain: 1,
    service: "CodeCommit",
    q: "What encryption algorithm does CodeCommit use for repositories at rest?",
    options: [
      "AES-256 with a CodeCommit-managed key",
      "AWS KMS (customer or AWS-managed CMK)",
      "RSA-2048 applied at the object level",
      "TLS 1.3 with per-repo certificates"
    ],
    answer: 1,
    explanation: "CodeCommit integrates with AWS KMS to encrypt repository data at rest using an AWS-managed key by default, or a customer-managed CMK. TLS is used for in-transit encryption\u2014it is a separate concern from at-rest encryption."
  },
  {
    domain: 1,
    service: "CodeCommit",
    q: "Which branching strategy involves committing directly to `main` and using feature flags instead of long-lived branches?",
    options: [
      "GitFlow",
      "GitHub Flow",
      "Trunk-based development",
      "Release branching"
    ],
    answer: 2,
    explanation: "Trunk-based development means developers commit small, frequent changes directly to `main` (the trunk) and use feature flags to hide incomplete work, avoiding the integration pain of long-lived feature branches."
  },
  {
    domain: 1,
    service: "CodeCommit",
    q: "CodeCommit repository triggers can invoke which two target types?",
    options: [
      "SQS queues and DynamoDB streams",
      "SNS topics and Lambda functions",
      "EventBridge rules and Step Functions",
      "CodePipeline stages and CodeBuild projects"
    ],
    answer: 1,
    explanation: "CodeCommit repository triggers natively support two target types: SNS topics (for fan-out notifications) and Lambda functions (for custom automation). EventBridge events are separate from repository triggers and configured differently."
  },
  {
    domain: 1,
    service: "CodeCommit",
    q: "What is the correct mechanism to prevent direct pushes to a protected branch in CodeCommit?",
    options: [
      "Enable 'branch protection' in repository settings",
      "Use a pre-receive hook in the CodeCommit console",
      "SCPs and IAM policies (CodeCommit has no native push-blocking feature)",
      "Configure a CodePipeline approval action on the branch"
    ],
    answer: 2,
    explanation: "CodeCommit has no native branch protection UI. To block direct pushes you must use IAM policies that deny `codecommit:GitPush` on specific branch refs, or SCPs to enforce this org-wide. Pre-receive hooks and branch protection settings don't exist in CodeCommit."
  },
  {
    domain: 1,
    service: "CodeCommit",
    q: "When using CodeCommit as a CodePipeline source, which detection method is recommended over polling?",
    options: [
      "Webhook",
      "Periodic polling every 1 minute",
      "EventBridge rule on repository state change",
      "SNS notification to CodePipeline"
    ],
    answer: 2,
    explanation: "AWS recommends an EventBridge rule that triggers on CodeCommit repository state changes. EventBridge delivers events near-instantly and avoids the up-to-1-minute latency of periodic polling, which also wastes API calls."
  },
  {
    domain: 1,
    service: "CodeCommit",
    q: "CodeCommit approval rule templates define approvers using which format?",
    options: [
      "Email addresses of IAM users",
      "IAM principals: users, roles, or groups",
      "GitHub-style CODEOWNERS file entries",
      "LDAP group distinguished names"
    ],
    answer: 1,
    explanation: "CodeCommit approval rule templates reference approvers using IAM principal ARNs\u2014users, roles, or groups. Email addresses, CODEOWNERS files, and LDAP groups are not valid formats for CodeCommit approval rules."
  },
  {
    domain: 1,
    service: "CodeCommit",
    q: "What is the correct approach for granting a developer in Account B read-only access to a CodeCommit repository in Account A?",
    options: [
      "Share the HTTPS clone URL; IAM credentials are global",
      "Create a CodeCommit mirror in Account B",
      "Have the developer assume a cross-account IAM role in Account A",
      "Enable VPC peering and use SSH keys"
    ],
    answer: 2,
    explanation: "Cross-account CodeCommit access is granted via a cross-account IAM role in Account A that the developer in Account B assumes. They then use temporary credentials from that role to clone/pull the repository. IAM credentials are account-scoped, not global."
  },

  /* -- CodePipeline (8) -- */
  {
    domain: 1,
    service: "CodePipeline",
    q: "How does CodePipeline store and pass artifacts between stages?",
    options: [
      "ECR images tagged per pipeline execution",
      "S3 bucket (ZIP files), optionally encrypted with KMS",
      "EFS share mounted by each action provider",
      "DynamoDB item per artifact with S3 reference"
    ],
    answer: 1,
    explanation: "CodePipeline stores all inter-stage artifacts as ZIP files in a designated S3 artifact bucket. You can encrypt this bucket with a KMS key\u2014required for cross-account pipelines so target account principals can decrypt the artifacts."
  },
  {
    domain: 1,
    service: "CodePipeline",
    q: "Which CodePipeline V2 feature lets you start a pipeline only when changes occur in specific file paths or branches (e.g., only src/**)?",
    options: [
      "Stage conditions with file-path expressions",
      "Pipeline triggers with glob-pattern filters on file paths and branches",
      "EventBridge content filtering on CodeCommit push events",
      "A Lambda Invoke action that checks changed files before proceeding"
    ],
    answer: 1,
    explanation: "CodePipeline V2 introduced trigger filters that accept glob patterns (e.g., `src/**`, `*.tf`) on file paths and branches. The pipeline only starts when a push matches the patterns, avoiding spurious executions from unrelated changes."
  },
  {
    domain: 1,
    service: "CodePipeline",
    q: "Which action type pauses a pipeline execution and can send a notification for human review?",
    options: [
      "Invoke (Lambda)",
      "Deploy (CloudFormation CHANGE_SET_EXECUTE)",
      "Manual Approval",
      "Test (CodeBuild)"
    ],
    answer: 2,
    explanation: "The Manual Approval action halts the pipeline and optionally sends an SNS notification to reviewers. The pipeline only resumes once an authorized user approves or rejects it in the console or via the API, making it ideal as a gate before production deployments."
  },
  {
    domain: 1,
    service: "CodePipeline",
    q: "CodePipeline supports three pipeline execution modes. Which mode cancels the in-progress execution when a newer one arrives?",
    options: [
      "PARALLEL",
      "QUEUED",
      "SEQUENTIAL",
      "SUPERSEDED"
    ],
    answer: 3,
    explanation: "SUPERSEDED mode cancels the currently in-progress execution when a newer commit triggers the pipeline, ensuring the latest code always runs without waiting. QUEUED serializes executions; PARALLEL runs all concurrently."
  },
  {
    domain: 1,
    service: "CodePipeline",
    q: "Which two action providers does the CodePipeline 'Invoke' action category support?",
    options: [
      "CodeBuild and CodeDeploy",
      "Lambda and Step Functions",
      "ECS and Fargate",
      "SNS and SQS"
    ],
    answer: 1,
    explanation: "The Invoke action category supports Lambda functions and Step Functions state machines. CodeBuild belongs to the Build category and CodeDeploy to the Deploy category\u2014each has its own dedicated action category."
  },
  {
    domain: 1,
    service: "CodePipeline",
    q: "What is a CodePipeline webhook used for?",
    options: [
      "Sending notifications when a stage fails",
      "Allowing external systems to trigger a pipeline via an HTTP endpoint",
      "Forwarding artifacts to an external S3 bucket",
      "Polling a GitHub repo for changes every 30 seconds"

  const clone = _checkSvgTemplate.cloneNode(true);
  clone.setAttribute('width', String(size));
  clone.setAttribute('height', String(size));
  return clone;
}

/* ===== Menu ===== */
function buildMenu() {
  const list = document.getElementById('domain-list');
  list.innerHTML = '';

  Object.keys(DOMAINS).map(Number).forEach(domainNum => {
    const domain = DOMAINS[domainNum];
    const services = servicesByDomain[domainNum] || [];
    const domainQCount = domainQuestionCounts[domainNum] || 0;
    const allServicesSelected = services.length > 0 && services.every(s => state.selectedServices.has(s.id));
    const someServicesSelected = services.some(s => state.selectedServices.has(s.id));

    const card = document.createElement('div');
    card.className = 'domain-card';
    card.style.setProperty('--domain-color', domain.color);

    // Domain header row
    const header = document.createElement('div');
    const isChecked = allServicesSelected || (services.length === 0 && state.selectedDomains.has(domainNum));
    header.className = 'domain-header' + (isChecked ? ' checked' : '');
    header.setAttribute('tabindex', '0');
    header.setAttribute('role', 'checkbox');
    header.setAttribute('aria-checked', String(isChecked));
    header.setAttribute('aria-expanded', String(state.expandedDomains.has(domainNum)));
    header.setAttribute('aria-label', `Domain ${domainNum}: ${domain.name} - ${domainQCount} questions`);
    header.dataset.domain = domainNum;

    const cb = document.createElement('div');
    cb.className = 'domain-checkbox';
    cb.appendChild(makeCheckSvg(12));

    const numBadge = document.createElement('span');
    numBadge.className = 'domain-num';
    numBadge.style.cssText = `background:${domain.bg};color:${domain.color}`;
    numBadge.textContent = `D${domainNum}`;

    const name = document.createElement('span');
    name.className = 'domain-name';
    name.textContent = domain.name;

    const count = document.createElement('span');
    count.className = 'domain-count';
    count.textContent = `${domainQCount}q`;

    const expand = document.createElement('span');
    expand.className = 'domain-expand' + (state.expandedDomains.has(domainNum) ? ' open' : '');
    expand.textContent = '\u25BC';

    header.append(cb, numBadge, name, count, expand);

    // Click on checkbox area toggles domain selection
    cb.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDomain(domainNum);
    });

    // Click on header expands/collapses
    header.addEventListener('click', () => {
      if (services.length === 0) {
        toggleDomain(domainNum);
        return;
      }
      if (state.expandedDomains.has(domainNum)) {
        state.expandedDomains.delete(domainNum);
      } else {
        state.expandedDomains.add(domainNum);
      }
      buildMenu();
    });

    header.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        toggleDomain(domainNum);
      }
    });

    card.appendChild(header);

    // Service list (expandable)
    if (services.length > 0) {
      const svcList = document.createElement('div');
      svcList.className = 'domain-services' + (state.expandedDomains.has(domainNum) ? ' open' : '');

      services.forEach(svc => {
        const checked = state.selectedServices.has(svc.id);
        const row = document.createElement('div');
        row.className = 'service-row' + (checked ? ' checked' : '');
        row.style.setProperty('--domain-color', domain.color);
        row.dataset.id = svc.id;
        row.setAttribute('role', 'checkbox');
        row.setAttribute('aria-checked', String(checked));
        row.setAttribute('tabindex', '0');

        const sCb = document.createElement('div');
        sCb.className = 'service-checkbox';
        sCb.appendChild(makeCheckSvg(10));

        const badge = document.createElement('span');
        badge.className = 'service-badge';
        badge.style.cssText = `background:${domain.bg};color:${domain.color}`;
        badge.textContent = svc.id;

        const sCount = document.createElement('span');
        sCount.className = 'service-count';
        sCount.textContent = `${questionCounts[svc.id] || 0}q`;

        row.append(sCb, badge, sCount);

        row.addEventListener('click', () => {
          toggleService(svc.id, domainNum);
        });
        row.addEventListener('keydown', e => {
          if (e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            toggleService(svc.id, domainNum);
          }
        });

        svcList.appendChild(row);
      });

      card.appendChild(svcList);
    }

    list.appendChild(card);
  });

  updateStartBtn();
}

function toggleDomain(domainNum) {
  const services = servicesByDomain[domainNum] || [];
  const allSelected = services.length > 0
    ? services.every(s => state.selectedServices.has(s.id))
    : state.selectedDomains.has(domainNum);

  if (allSelected) {
    state.selectedDomains.delete(domainNum);
    services.forEach(s => state.selectedServices.delete(s.id));
  } else {
    state.selectedDomains.add(domainNum);
    services.forEach(s => state.selectedServices.add(s.id));
  }
  buildMenu();
}

function toggleService(svcId, domainNum) {
  if (state.selectedServices.has(svcId)) {
    state.selectedServices.delete(svcId);
  } else {
    state.selectedServices.add(svcId);
  }
  // Update domain selection state
  const services = servicesByDomain[domainNum] || [];
  if (services.every(s => state.selectedServices.has(s.id))) {
    state.selectedDomains.add(domainNum);
  } else {
    state.selectedDomains.delete(domainNum);
  }
  buildMenu();
}

function updateStartBtn() {
  let totalQ = 0;
  state.selectedServices.forEach(svcId => {
    totalQ += questionCounts[svcId] || 0;
  });
  document.getElementById('btn-start').disabled = totalQ === 0;
  const allSelected = state.selectedServices.size === SERVICES.length;
  document.getElementById('btn-toggle-all').textContent = allSelected ? 'Deselect All' : 'Select All';
}

document.getElementById('btn-toggle-all').addEventListener('click', () => {
  const allSelected = state.selectedServices.size === SERVICES.length;
  if (allSelected) {
    state.selectedServices.clear();
    state.selectedDomains.clear();
  } else {
    SERVICES.forEach(s => state.selectedServices.add(s.id));
    Object.keys(DOMAINS).map(Number).forEach(d => state.selectedDomains.add(d));
  }
  buildMenu();
});

document.getElementById('btn-start').addEventListener('click', () => startQuiz());

/* ===== Quiz ===== */
function startQuiz(questions) {
  state.queue = shuffle(questions || QUESTIONS.filter(q => state.selectedServices.has(q.service)));
  state.currentIdx = 0;
  state.results = {};
  state.missedQuestions = [];
  state.queue.forEach(q => {
    if (!state.results[q.service]) state.results[q.service] = { correct: 0, total: 0 };
  });
  show('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.queue[state.currentIdx];
  const total = state.queue.length;
  state.answered = false;

  const domain = DOMAINS[q.domain];
  const accentColor = domain ? domain.color : '#3b82f6';

  // Set accent for this question's domain
  document.documentElement.style.setProperty('--accent', accentColor);

  // Domain label
  const domainLabel = document.getElementById('quiz-domain-label');
  domainLabel.textContent = domain ? `Domain ${q.domain}: ${domain.name}` : '';
  domainLabel.style.color = accentColor;

  // Progress
  document.getElementById('progress-label').textContent = `${state.currentIdx + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((state.currentIdx + 1) / total) * 100}%`;

  // Badge
  const badge = document.getElementById('q-badge');
  badge.textContent = q.service;
  badge.style.background = domain ? domain.bg : 'rgba(59,130,246,0.15)';
  badge.style.color = accentColor;

  // Question
  document.getElementById('q-text').textContent = q.q;

  // Options
  const optionIndices = shuffle(q.options.map((_, i) => i));
  state.currentCorrectIdx = optionIndices.indexOf(q.answer);
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];
  optionIndices.forEach((origIdx, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const letterSpan = document.createElement('span');
    letterSpan.className = 'option-letter';
    letterSpan.textContent = letters[i];
    const textSpan = document.createElement('span');
    textSpan.textContent = q.options[origIdx];
    btn.append(letterSpan, textSpan);
    btn.addEventListener('click', () => selectAnswer(i));
    grid.appendChild(btn);
  });

  // Explanation reset
  const exBox = document.getElementById('explanation-box');
  exBox.classList.remove('visible');
  exBox.style.borderLeftColor = accentColor;
  exBox.querySelector('.explanation-label').textContent = '';
  exBox.querySelector('.explanation-body').textContent = '';

  // Footer
  document.getElementById('feedback-text').textContent = '';
  document.getElementById('feedback-text').className = 'feedback-text';
  document.getElementById('btn-next').classList.add('hidden');
}

function selectAnswer(chosenIdx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.queue[state.currentIdx];
  const correct = state.currentCorrectIdx;
  const buttons = document.querySelectorAll('.option-btn');

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosenIdx) btn.classList.add('wrong');
  });

  state.results[q.service].total++;
  const isCorrect = chosenIdx === correct;
  if (isCorrect) {
    state.results[q.service].correct++;
  } else {
    state.missedQuestions.push(q);
  }

  const fb = document.getElementById('feedback-text');
  if (isCorrect) {
    fb.textContent = 'Correct!';
    fb.className = 'feedback-text correct';
  } else {
    fb.textContent = 'Incorrect';
    fb.className = 'feedback-text wrong';
  }

  document.getElementById('btn-next').classList.remove('hidden');

  // Explanation
  const domain = DOMAINS[q.domain];
  const box = document.getElementById('explanation-box');
  box.style.borderLeftColor = domain ? domain.color : '#3b82f6';
  box.querySelector('.explanation-label').textContent = 'Explanation';
  box.querySelector('.explanation-body').textContent = q.explanation || '';
  // Force a browser reflow before adding the transition class;
  // without the double-rAF, the CSS opacity transition won't animate
  // because the element starts with opacity:0 and the class add
  // would batch with the DOM insert in the same frame.
  requestAnimationFrame(() => requestAnimationFrame(() => box.classList.add('visible')));
}

function advanceQuestion() {
  if (!state.answered) return;
  state.currentIdx++;
  if (state.currentIdx >= state.queue.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

document.getElementById('btn-next').addEventListener('click', advanceQuestion);

// Keyboard
document.addEventListener('keydown', e => {
  const quizVisible = !document.getElementById('screen-quiz').classList.contains('hidden');
  if (!quizVisible) return;
  if (e.target.closest('button')) return;

  if (!state.answered && ['1','2','3','4'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    const buttons = document.querySelectorAll('.option-btn');
    if (idx < buttons.length) {
      e.preventDefault();
      selectAnswer(idx);
    }
  }
  if (state.answered && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    advanceQuestion();
  }
});

/* ===== Results ===== */
function showResults() {
  const totalCorrect = Object.values(state.results).reduce((s, r) => s + r.correct, 0);
  const totalQuestions = state.queue.length;
  const pct = Math.round((totalCorrect / totalQuestions) * 100);

  document.getElementById('score-big').textContent = `${totalCorrect} / ${totalQuestions}`;
  document.getElementById('score-pct').textContent = `${pct}% correct`;

  const grid = document.getElementById('breakdown-grid');
  grid.innerHTML = '';

  // Group services by domain for display
  const domainsInQuiz = [...new Set(state.queue.map(q => q.domain))].sort((a, b) => a - b);

  domainsInQuiz.forEach(domainNum => {
    const domain = DOMAINS[domainNum];

    // Compute domain-level score
    const domainServices = state.queue.filter(q => q.domain === domainNum).map(q => q.service);
    const uniqueServices = [...new Set(domainServices)];
    let domainCorrect = 0, domainTotal = 0;
    uniqueServices.forEach(svcId => {
      const r = state.results[svcId];
      if (r) { domainCorrect += r.correct; domainTotal += r.total; }
    });

    if (domainTotal === 0) return;

    const domainRatio = domainCorrect / domainTotal;

    // Domain header row
    const dHeader = document.createElement('div');
    dHeader.className = 'domain-breakdown-header';

    const dBadge = document.createElement('span');
    dBadge.className = 'domain-num';
    dBadge.style.cssText = `background:${domain.bg};color:${domain.color}`;
    dBadge.textContent = `D${domainNum}`;

    const dName = document.createElement('span');
    dName.className = 'domain-breakdown-name';
    dName.textContent = domain.name;

    const dBarWrap = document.createElement('div');
    dBarWrap.className = 'breakdown-bar-wrap';
    const dBar = document.createElement('div');
    dBar.className = 'breakdown-bar';
    dBar.style.cssText = `width:${Math.round(domainRatio*100)}%;background:${domain.color}`;
    dBarWrap.appendChild(dBar);

    let dScoreClass = 'partial';
    if (domainRatio === 1) dScoreClass = 'perfect';
    else if (domainRatio === 0) dScoreClass = 'zero';

    const dScore = document.createElement('span');
    dScore.className = `breakdown-score ${dScoreClass}`;
    dScore.textContent = `${domainCorrect}/${domainTotal}`;

    dHeader.append(dBadge, dName, dBarWrap, dScore);
    grid.appendChild(dHeader);

    // Per-service rows under this domain
    uniqueServices.forEach(svcId => {
      const r = state.results[svcId];
      if (!r || r.total === 0) return;
      const ratio = r.correct / r.total;

      const row = document.createElement('div');
      row.className = 'breakdown-row';

      const badge = document.createElement('span');
      badge.className = 'service-badge';
      badge.style.cssText = `background:${domain.bg};color:${domain.color};flex:1`;
      badge.textContent = svcId;

      const barWrap = document.createElement('div');
      barWrap.className = 'breakdown-bar-wrap';
      const bar = document.createElement('div');
      bar.className = 'breakdown-bar';
      bar.style.cssText = `width:${Math.round(ratio*100)}%;background:${ratio===1?'#22c55e':ratio===0?'#ef4444':'#f59e0b'}`;
      barWrap.appendChild(bar);

      let scoreClass = 'partial';
      if (ratio === 1) scoreClass = 'perfect';
      else if (ratio === 0) scoreClass = 'zero';

      const score = document.createElement('span');
      score.className = `breakdown-score ${scoreClass}`;
      score.textContent = `${r.correct}/${r.total}`;

      row.append(badge, barWrap, score);
      grid.appendChild(row);
    });
  });

  // Show/hide re-quiz button
  const requizBtn = document.getElementById('btn-requiz-missed');
  if (state.missedQuestions.length > 0) {
    requizBtn.classList.remove('hidden');
    requizBtn.textContent = `Re-quiz ${state.missedQuestions.length} Missed`;
  } else {
    requizBtn.classList.add('hidden');
  }

  show('screen-results');
}

document.getElementById('btn-restart').addEventListener('click', () => {
  document.documentElement.style.setProperty('--accent', '#3b82f6');
  show('screen-menu');
});

document.getElementById('btn-requiz-missed').addEventListener('click', () => {
  if (state.missedQuestions.length > 0) {
    startQuiz([...state.missedQuestions]);
  }
});

/* ===== Init ===== */
buildMenu();
show('screen-menu');
</script>
</body>
</html>
